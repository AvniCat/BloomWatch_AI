name: Weekly BloomWatch refresh + retrain

on:
  schedule:
    # Every Friday 03:00 UTC (08:30 IST) — MODIS 8-day usually posts by Thursday
    - cron: '0 3 * * 5'
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: app/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run refresh pipeline (VIIRS + IMD + inference)
        env:
          EARTHDATA_USER: ${{ secrets.EARTHDATA_USER }}
          EARTHDATA_PASS: ${{ secrets.EARTHDATA_PASS }}
        run: python scripts/refresh_weekly.py
        continue-on-error: true

      - name: Rolling XGBoost retrain (Option A — monitor-only for first month)
        env:
          RETRAIN_MONITOR_ONLY: "1"
          LLM_MODE: local
        run: python scripts/retrain_weekly.py
        continue-on-error: true

      - name: Commit updated forecast + shadow models
        run: |
          git config user.name "bloomwatch-bot"
          git config user.email "bot@bloomwatch.local"
          cd ..
          git add app/data/current_forecast.json app/data/live/modis/latest.json app/data/live/imd/current_window.json app/data/historical/revised_master_dts_weekly.csv app/models/xgb_bloom.pkl app/models/xgb_bloom.meta.json app/models/history/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Weekly refresh + retrain: $(date -u +%Y-%m-%d)"
            git push
          fi
