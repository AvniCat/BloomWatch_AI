services:
  - type: web
    name: bloomwatch-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python scripts/train_and_save.py
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set via Render dashboard
      - key: GEMINI_MODEL
        value: gemini-flash-lite-latest
      - key: LLM_MODE
        value: primary
      - key: PYTHON_VERSION
        value: 3.11.9
